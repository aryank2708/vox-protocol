<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Draft 4 — Eye (ayn = eye in Arabic)">
  <rect width="256" height="256" rx="56" fill="#06060a"/>

  <!-- Almond eye outline -->
  <path d="M 36 128 Q 128 56 220 128 Q 128 200 36 128 Z"
        stroke="#fafafa" stroke-width="10"
        fill="none"
        stroke-linejoin="round"/>

  <!-- Iris (coral) -->
  <circle cx="128" cy="128" r="34" fill="#ff4c24"/>

  <!-- Pupil dot (ink — keeps focus tight) -->
  <circle cx="128" cy="128" r="14" fill="#06060a"/>

  <!-- Highlight glint (lime — the always-on signal) -->
  <circle cx="118" cy="118" r="7" fill="#c3ff00"/>

  <!-- Subtle slash through the iris — keeps brand DNA visible -->
  <line x1="106" y1="146" x2="150" y2="110"
        stroke="#fafafa" stroke-width="3"
        stroke-linecap="round"
        opacity="0.55"/>
</svg>
