<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Draft 3 — Geometric brackets with slash">
  <rect width="256" height="256" rx="56" fill="#06060a"/>

  <!-- Left code-bracket [ -->
  <path d="M 84 70 L 56 70 L 56 186 L 84 186"
        stroke="#fafafa" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right code-bracket ] -->
  <path d="M 172 70 L 200 70 L 200 186 L 172 186"
        stroke="#fafafa" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Coral slash inside the brackets — the brand mark held in code -->
  <line x1="106" y1="200" x2="150" y2="56"
        stroke="#ff4c24" stroke-width="18"
        stroke-linecap="round"/>

  <!-- Lime live-status dot in upper-left -->
  <circle cx="36" cy="36" r="7" fill="#c3ff00"/>
</svg>
