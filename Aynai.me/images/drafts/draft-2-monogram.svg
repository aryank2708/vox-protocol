<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Draft 2 — A/I Monogram">
  <rect width="256" height="256" rx="56" fill="#06060a"/>

  <!-- Letter A (left) -->
  <path d="M 50 184 L 90 76 L 130 184"
        stroke="#fafafa" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 65 152 L 115 152"
        stroke="#fafafa" stroke-width="14"
        stroke-linecap="round" fill="none"/>

  <!-- Coral italic slash divider (the hero of the brand) -->
  <line x1="142" y1="200" x2="166" y2="56"
        stroke="#ff4c24" stroke-width="14"
        stroke-linecap="round"/>

  <!-- Letter I (right) -->
  <line x1="200" y1="76" x2="200" y2="184"
        stroke="#fafafa" stroke-width="16"
        stroke-linecap="round"/>
  <line x1="184" y1="76" x2="216" y2="76"
        stroke="#fafafa" stroke-width="14"
        stroke-linecap="round"/>
  <line x1="184" y1="184" x2="216" y2="184"
        stroke="#fafafa" stroke-width="14"
        stroke-linecap="round"/>

  <!-- Lime corner accent dot -->
  <circle cx="36" cy="36" r="7" fill="#c3ff00"/>
</svg>
