<!--
  AYN/AI · The Aperture · primary mark (dark variant)
  24u grid · slash 12° · 1u seam offset · cream on ink.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="AYN/AI mark">
  <rect width="24" height="24" rx="1.2" fill="#0b0b0c"/>
  <!-- Lower-right half: solid block -->
  <path d="M 22 2 L 22 22 L 2 22 L 13.6 2 Z" fill="#f4f1ea"/>
  <!-- Upper-left half: outlined, 1u seam offset upward -->
  <path d="M 2 1 L 13.6 1 L 2 21 Z" fill="none" stroke="#f4f1ea" stroke-width="0.85" stroke-linejoin="miter"/>
  <!-- Italic accent slash between halves -->
  <path d="M 14.4 1 L 2.4 21" stroke="#ff5b1f" stroke-width="0.7"/>
</svg>
