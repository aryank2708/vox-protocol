<!--
  AYN/AI · The Aperture · horizontal wordmark (dark bg variant)
  Mark + ayn / ai · JetBrains Mono 700 + Instrument Serif italic slash.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" role="img" aria-label="AYN/AI">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;family=Instrument+Serif:ital@1&amp;display=swap');
      .wm-mark { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
                 font-weight: 700; font-size: 32px; letter-spacing: -0.8px; }
      .wm-slash { font-family: 'Instrument Serif', Georgia, serif;
                  font-style: italic; font-weight: 400; font-size: 44px; }
    </style>
  </defs>

  <!-- The Aperture mark, 40px scaled -->
  <g transform="translate(0 8) scale(1.667)">
    <path d="M 22 2 L 22 22 L 2 22 L 13.6 2 Z" fill="#f4f1ea"/>
    <path d="M 2 1 L 13.6 1 L 2 21 Z" fill="none" stroke="#f4f1ea" stroke-width="0.85" stroke-linejoin="miter"/>
    <path d="M 14.4 1 L 2.4 21" stroke="#ff5b1f" stroke-width="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="56" y="40" class="wm-mark" fill="#f4f1ea">ayn</text>
  <text x="120" y="44" class="wm-slash" fill="#ff5b1f">/</text>
  <text x="144" y="40" class="wm-mark" fill="#f4f1ea">ai</text>
</svg>
