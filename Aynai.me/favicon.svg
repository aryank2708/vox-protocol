  <rect width="32" height="32" rx="4" fill="#0b0b0c"/>
  <!-- Lower-right half: solid block (the AI / system half) -->
  <path d="M 28 4 L 28 28 L 4 28 L 18 4 Z" fill="#f4f1ea"/>
